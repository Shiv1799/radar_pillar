$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json

experiment_name: openpcdet-radar-training
display_name: openpcdet-ddp-training

code: .

command: >
  cd OpenPCDet && export PYTHONPATH=$(pwd):$PYTHONPATH && mkdir -p data && ln -sfn ${{inputs.dataset}} data/kitti && python3 tools/train.py --launcher pytorch --cfg_file tools/cfgs/kitti_models/pointpillar.yaml --batch_size 16 --epochs 80 --extra_tag azure_ddp_run
inputs:
  dataset:
    type: uri_folder
    path: azureml://subscriptions/927defc6-a6d0-4e3b-9a63-c48acdf0b63d/resourcegroups/RG-Prod-AIPlatform-Dev-001/workspaces/MLW-Prod-AIPlatform-Dev-001/datastores/workspaceblobstore/paths/private_data/data/
    mode: ro_mount

outputs:
  model_output:
    type: uri_folder
    mode: rw_mount

environment: azureml:openpcdet-env:6

compute: azureml:gpu-hp-cluster

resources:
  instance_count: 1

distribution:
  type: pytorch
  process_count_per_instance: 4

tags:
  framework: openpcdet
  training: distributed
  model: pointpillar