$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json

experiment_name: openpcdet-radar-training
display_name: openpcdet-preprocess-train

code: .

command: >
  cd OpenPCDet &&
  pip install -r requirements.txt &&
  python3 setup.py develop &&
  rm -rf data1 &&
  mkdir data1 &&
  ln -s ${{inputs.dataset}}/kitti data1/kitti &&
  ls data1/kitti &&
  python3 tools/train.py --cfg_file tools/cfgs/kitti_models/pointpillar.yaml --batch_size 8 --epochs 15 --extra_tag azure_run --use_amp --logger_iter_interval 100 --ckpt_save_interval 5 --max_ckpt_save_num 20 --wo_gpu_stat

inputs:
  dataset:
    type: uri_folder
    path: azureml://subscriptions/927defc6-a6d0-4e3b-9a63-c48acdf0b63d/resourcegroups/RG-Prod-AIPlatform-Dev-001/workspaces/MLW-Prod-AIPlatform-Dev-001/datastores/workspaceblobstore/paths/private_data/data/
    # path: azureml://subscriptions/927defc6-a6d0-4e3b-9a63-c48acdf0b63d/resourcegroups/RG-Prod-AIPlatform-Dev-001/workspaces/MLW-Prod-AIPlatform-Dev-001/datastores/workspaceblobstore/paths/private_data/data/
    mode: ro_mount

outputs:
  model_output:
    type: uri_folder
    mode: rw_mount

  tensorboard_logs:
    type: uri_folder
    mode: rw_mount
    

environment: azureml:openpcdet-env:1

compute: azureml:gpu-cluster

resources:
  instance_count: 1

tags:
  framework: openpcdet
  task: radar_detection

